<div class="col-12 p-0 m-0">
    <div class="d-flex justify-content-center p-0 m-0">
        <div class="col-12 pl-0 pr-0 pb-0 pt-1 m-0" style="background-color: #fff;">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 p-0 m-0 card "
                style="border: 1px solid #ccc;">

                <div class="card-header pt-0 pb-0 pl-2 pr-0 clearfix"
                    style="height: 30px; border: 1px solid #ccc; background-color: #138496;">
                    <h4 class="myCustomTitle pt-1"><i class="fa fa-table"></i> থানার তথ্য
                        {{cmnEntity.isShow?'তালিকা':''}}
                    </h4>
                    <common-button-top #cmnsrv (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                        [btnForm]="thanaForm"></common-button-top>
                </div>

                <!-- Entry Form -->
                <div *ngIf="!cmnEntity.isShow" class="col-md-12 pl-0 pr-0 pt-2 pb-0 m-0 table-primary">
                    <form id="subForm" [formGroup]="thanaForm" #f="ngForm" class="form-horizontal">
                        <div class="row p-0 m-0">
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="divisionId"
                                        style="float: left;">বিভাগ: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <ng-select2 #divState formControlName="divisionId" [options]="options"
                                            [allowClear]="true" id="divisionId" name="divisionId"
                                            (valueChanged)="getDistrictById($event)" [data]="divisionList"
                                            [placeholder]="'অনুগ্রহ করে নির্বাচন করুন'">
                                        </ng-select2>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="districtId"
                                        style="float: left;">জেলা: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <ng-select2 #distState formControlName="districtId" [options]="options"
                                            [allowClear]="true" id="districtId" name="districtId" [data]="districtList"
                                            [placeholder]="'অনুগ্রহ করে নির্বাচন করুন'">
                                        </ng-select2>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="latitude"
                                        style="float: left;">Latitude: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="latitude" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="latitude"
                                                placeholder="Enter latitude" name="latitude">
                                        </div>
                                    </div>
                                </div>

                            </div>
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <!-- Thana Name(BN) -->
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="nameEn"
                                        style="float: left;">Thana Name: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="nameEn" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="nameEn"
                                                placeholder="Enter thana name" name="nameEn">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <!-- Thana Name(BN) -->
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="nameBn"
                                        style="float: left;">থানার নাম: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="nameBn" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="nameBn"
                                                placeholder="থানার নাম লিখুন" name="nameBn">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="longitude"
                                        style="float: left;">Longitude: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="longitude" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="longitude"
                                                placeholder="Enter longitude" name="longitude">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List-->
            <div *ngIf="cmnEntity.isShow" class="card-body pl-0 pr-4 pt-2"
                style="min-height: 460px; margin-bottom: -20px;">

                <div class="row">                    
                    <div class="col-md-3">
                        <div class="form-group clearfix">
                            <label class="control-label col-sm-2 ml-2 p-0 m-0 pt-1" for="districtsId"
                                style="float: left;">জেলা: </label>
                            <div class="col-sm-8 p-0 m-0" style="float: left;">
                                <ng-select2 [(ngModel)]="districtsId" [options]="options"
                                    [allowClear]="true" id="districtsId" name="districtsId" [data]="districtLists"
                                    (valueChanged)="districtsId=$event; getListByPage(pageSize);"
                                    [placeholder]="'অনুগ্রহ করে নির্বাচন করুন'">
                                </ng-select2>
                            </div>
                            <!-- <button class="col-sm-2" (click)="getListByPage(pageSize);">Go</button> -->
                        </div>
                    </div>

                    <div class="col-md-12">
                        <pager-top (setPage)="getListByPage($event)" (sendList)="thanaList=$event" [pageSize]="pageSize" [id]="nDistrictId"
                            [IsSearchOnServer]="true" [responseTag]="responseTag" [apiUrl]="_listByPageUrl">
                        </pager-top>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <div class="table-responsive" style="height:600px; overflow:auto;">
                            <table id="table" class="table table-striped table-sm table-bordered p-0"
                                *ngIf="this.isLoaded">
                                <thead class="table-dark"
                                    style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left;">
                                    <tr class="myCustomTableHeaderText">
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 30%;">
                                            থানার নাম</th>

                                            <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 25%;">
                                            Thana Name</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 25%;">
                                            জেলা</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: center;  width: 5%;">
                                            Status</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: center; width: 15%;">
                                            Action</th>
                                    </tr>
                                </thead>
                                <tbody class="p-0" style="padding-bottom: 0px; margin-bottom: 0px;">
                                    <tr *ngFor="let item of this.thanaList;let sl = index">
                                        <td class="pl-2 pr-1 pt-1 pb-1">
                                            {{item.nameBn}}
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1">
                                            {{item.nameEn}}
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1">
                                            {{item.districtBn}}
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center;">
                                            <h6><span
                                                    class="badge badge-pill badge-{{item.isActive=='1'?'success':'danger'}}">{{item.isActive=='1'?'Active':'Inactive'}}</span>
                                            </h6>
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center;">
                                            <common-button-option #cmnbuttonoption
                                                (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                                                [model]="item" [itemName]="item.nameBn"></common-button-option>
                                        </td>

                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <pager-bottom #cmnpager (setPage)="getListByPage($event)" (sendList)="thanaList=$event" [id]="nDistrictId"
                            [cmnEntity]="cmnEntity" [pageSize]="pageSize" [responseTag]="responseTag"
                            [apiUrl]="_listByPageUrl"></pager-bottom>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
