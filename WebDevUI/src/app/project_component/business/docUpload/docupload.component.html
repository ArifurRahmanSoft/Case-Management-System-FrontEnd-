<div class="col-12 p-0 m-0">
    <div class="d-flex justify-content-center p-0 m-0">
        <div class="col-12 pl-0 pr-0 pb-0 pt-1 m-0" style="background-color: #fff;">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 p-0 m-0 card "
                style="border: 1px solid #ccc;">

                <div class="card-header pt-0 pb-0 pl-2 pr-0 clearfix"
                    style="height: 30px; border: 1px solid #ccc; background-color: #138496;">
                    <h4 class="myCustomTitle pt-1"><i style="font-size: 14px;" class="fa fa-table"></i> ডকুমেন্ট আপলোড
                        {{cmnEntity.isShow?'তালিকা':''}}
                    </h4>
                    <common-button-top #cmnsrv (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                        [btnForm]="docUpForm"></common-button-top>
                </div>

                <!-- Entry Form -->
                <div class="col-md-12 pl-0 pr-0 pt-2 pb-0 m-0 table-primary">
                    <form id="subForm" [formGroup]="docUpForm" #f="ngForm" class="form-horizontal">
                        <div class="row p-0 m-0">
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="mouzaId"
                                        style="float: left;">মৌজা: </label>
                                    <div class="col-sm-7 p-0 m-0" style="float: left;">
                                        <ng-select2 formControlName="mouzaId" [options]="options" [allowClear]="true"
                                            id="mouzaId" name="mouzaId" [data]="mouzaList"
                                            [placeholder]="'অনুগ্রহ করে নির্বাচন করুন'">
                                        </ng-select2>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <input type="file" id="attachedFile" (change)="onFileChange()" #fileInput>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- List-->
            <div class="card-body pl-0 pr-4 pt-2" style="min-height: 460px; margin-bottom: -20px;">

                <div class="row">
                    <div class="col-md-6 pull-left">
                        <pager-top (setPage)="getListByPage($event)" (sendList)="docUploadList=$event"
                            [strId]="mouzaId" [pageSize]="pageSize" [IsSearchOnServer]="true"
                            [responseTag]="responseTag" [apiUrl]="_listByPageUrl">
                        </pager-top>
                    </div>
                    <div class="col-md-3">
                        <div class="form-group clearfix">
                            <label class="control-label col-sm-2 ml-1 p-0 m-0 pt-1" for="mouzaId"
                                style="float: left;">মৌজা: </label>
                            <div class="col-sm-9 p-0 m-0" style="float: left;">
                                <ng-select2 [(ngModel)]="mouzaId" [options]="options" [allowClear]="true" id="mouzaId"
                                    name="mouzaId" [data]="mouzaList" [placeholder]="'অনুগ্রহ করে নির্বাচন করুন'">
                                </ng-select2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-2 pull-right">
                        <button class="btn btn-sm btn-danger pull-right" (click)="getListByPage(pageSize)"><i
                                class="fa fa-refresh"></i> রিফ্রেশ</button>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <div class="table-responsive" style="height:700px; overflow:auto;">
                            <table id="table" class="table table-striped table-sm table-bordered p-0"
                                *ngIf="this.isLoaded">
                                <thead class="table-dark"
                                    style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left;">
                                    <tr class="banglaTitle myCustomTableHeaderText">
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 15%;">
                                            মৌজার নাম</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 70%;">
                                            নথির নাম</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: center; width: 15%;">
                                            এ্যাকশন</th>
                                    </tr>
                                </thead>
                                <tbody class="banglaTitle p-0" style="padding-bottom: 0px; margin-bottom: 0px;">
                                    <tr *ngFor="let item of this.docUploadList;let sl = index">
                                        <td class="pl-2 pr-1 pt-1 pb-1">
                                            {{item.nameBn}}
                                        </td>
                                        <td style="text-align: left; text-decoration: underline; color: blue; cursor: pointer;"
                                            (click)="_conversion.downloadReport(item.docVirtualPath,'')">
                                            {{item.docOrgName}}
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center;">
                                            <common-button-option #cmnbuttonoption
                                                (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                                                [model]="item" [itemName]="item.typeName"></common-button-option>
                                        </td>

                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <pager-bottom #cmnpager (setPage)="getListByPage($event)" (sendList)="docUploadList=$event"
                            [strId]="mouzaId" [cmnEntity]="cmnEntity" [pageSize]="pageSize"
                            [responseTag]="responseTag" [apiUrl]="_listByPageUrl"></pager-bottom>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
