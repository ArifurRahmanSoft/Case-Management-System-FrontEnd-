<div class="col-12 p-0 m-0">
    <div class="d-flex justify-content-center p-0 m-0">
        <div class="col-12 pl-0 pr-0 pb-0 pt-1 m-0" style="background-color: #fff;">

            <div class="col-xs-12 col-sm-12 col-md-12 col-lg-12 col-xl-12 p-0 m-0 card "
                style="border: 1px solid #ccc;">

                <div class="card-header pt-0 pb-0 pl-2 pr-0 clearfix"
                    style="height: 30px; border: 1px solid #ccc; background-color: #138496;">
                    <h4 class="myCustomTitle pt-1"><i style="font-size: 14px;" class="fa fa-table"></i> দলিল দাতাদের
                        {{cmnEntity.isShow?'তালিকা':'তথ্য'}}
                    </h4>
                    <common-button-top #cmnsrv (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                        [btnForm]="sellerForm"></common-button-top>
                </div>

                <!-- Entry Form -->
                <div *ngIf="!cmnEntity.isShow" class="col-md-12 pl-0 pr-0 pt-2 pb-0 m-0 table-primary">
                    <form id="subForm" [formGroup]="sellerForm" #f="ngForm" class="form-horizontal">
                        <div class="row p-0 m-0">
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="nameBn"
                                        style="float: left;">দাতার নাম: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="nameBn" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="nameBn"
                                                placeholder="দাতার নাম লিখুন" name="nameBn">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="fatherName"
                                        style="float: left;">পিতার নাম: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="fatherName" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="fatherName"
                                                placeholder="পিতার নাম লিখুন" name="fatherName">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="spouseName"
                                        style="float: left;">স্বামী/স্ত্রীর নাম: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="spouseName" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="spouseName"
                                                placeholder="স্বামী/স্ত্রীর নাম লিখুন" name="spouseName">
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="addressBn"
                                        style="float: left;">ঠিকানা: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <textarea formControlName="addressBn" rows="2" cols="5"
                                                class="form-control form-control-sm input-sm input-sm-*" id="addressBn"
                                                placeholder="ঠিকানা লিখুন" name="addressBn"></textarea>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12 col-xs-12 m-0 p-0" style="float: left;">
                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="nameEn"
                                        style="float: left;">Seller Name: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="nameEn" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="nameEn"
                                                placeholder="Enter Seller Name" name="nameEn">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="motherName"
                                        style="float: left;">মাতার নাম: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="motherName" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="motherName"
                                                placeholder="মাতার নাম লিখুন" name="motherName">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="nidNo"
                                        style="float: left;">এন.আই.ডি নং: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <input formControlName="nidNo" type="text"
                                                class="form-control form-control-sm input-sm input-sm-*" id="nidNo"
                                                placeholder="এন.আই.ডি নং লিখুন" name="nidNo">
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group clearfix">
                                    <label class="control-label col-sm-2 ml-4 p-0 m-0 pt-1" for="addressEn"
                                        style="float: left;">Address: </label>
                                    <div class="col-sm-9 p-0 m-0" style="float: left;">
                                        <div style="padding: 0px; width: 96.5%; font-size: 13px; float: left;">
                                            <textarea formControlName="addressEn" rows="2" cols="5"
                                                class="form-control form-control-sm input-sm input-sm-*" id="addressEn"
                                                placeholder="Enter seller address in English" name="addressEn"></textarea>
                                        </div>
                                    </div>
                                </div>                                
                            </div>                            
                        </div>
                    </form>
                </div>
            </div>

            <!-- List-->
            <div *ngIf="cmnEntity.isShow" class="card-body pl-0 pr-4 pt-2"
                style="min-height: 460px; margin-bottom: -20px;">

                <div class="row">
                    <div class="col-md-12">
                        <pager-top (setPage)="getListByPage($event)" (sendList)="sellerList=$event"
                            [pageSize]="pageSize" [IsSearchOnServer]="true" [responseTag]="responseTag"
                            [apiUrl]="_listByPageUrl">
                        </pager-top>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <div class="table-responsive" style="height:700px; overflow:auto;">
                            <table id="table" class="table table-striped table-sm table-bordered p-0"
                                *ngIf="this.isLoaded">
                                <thead class="table-dark"
                                    style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left;">
                                    <tr class="myCustomTableHeaderText">
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: left; width: 80%;">
                                            দাতার নাম</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: center;  width: 5%;">
                                            Status</th>
                                        <th
                                            style="position:sticky; top:-1.5px; z-index:1; cursor: pointer; text-align: center; width: 15%;">
                                            Action</th>
                                    </tr>
                                </thead>
                                <tbody class="p-0" style="padding-bottom: 0px; margin-bottom: 0px;">
                                    <tr *ngFor="let item of this.sellerList;let sl = index">                                        
                                        <td class="pl-2 pr-1 pt-1 pb-1">
                                            {{item.nameBn}}
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center;">
                                            <h6><span
                                                    class="badge badge-pill badge-{{item.isActive=='1'?'success':'danger'}}">{{item.isActive=='1'?'Active':'Inactive'}}</span>
                                            </h6>
                                        </td>
                                        <td class="pl-2 pr-1 pt-1 pb-1" style="text-align: center;">
                                            <common-button-option #cmnbuttonoption
                                                (executeSubmit)="cmnbtnAction($event)" [cmnEntity]="cmnEntity"
                                                [model]="item" [itemName]="item.nameBn"></common-button-option>
                                        </td>

                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="row pr-2">
                    <div class="col-md-12">
                        <pager-bottom #cmnpager (setPage)="getListByPage($event)" (sendList)="sellerList=$event"
                            [cmnEntity]="cmnEntity" [pageSize]="pageSize" [responseTag]="responseTag"
                            [apiUrl]="_listByPageUrl"></pager-bottom>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
